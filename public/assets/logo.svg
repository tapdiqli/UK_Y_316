<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="50%" stop-color="#0033FF" />
      <stop offset="100%" stop-color="#FF003C" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <g transform="translate(10, 10)">
    <!-- Shield/Crest Base -->
    <path d="M 40 0 L 70 20 L 70 60 C 70 80 40 100 40 100 C 40 100 10 80 10 60 L 10 20 Z" 
          fill="none" stroke="url(#logo-gradient)" stroke-width="4" filter="url(#glow)"/>
    
    <!-- Inner S Shape -->
    <path d="M 55 25 C 45 20 30 25 30 35 C 30 45 50 45 50 55 C 50 65 35 70 25 65" 
          fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
          
    <path d="M 40 15 L 40 75" fill="none" stroke="#FF003C" stroke-width="3" opacity="0.8"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="55" font-family="'Montserrat', sans-serif" font-weight="900" font-size="32" fill="#FFFFFF" letter-spacing="2">
    SORTE<tspan fill="url(#logo-gradient)">MESTRE</tspan>
  </text>
  <text x="105" y="80" font-family="'Poppins', sans-serif" font-weight="400" font-size="12" fill="#00F0FF" letter-spacing="4">
    O CASINO DEFINITIVO
  </text>
</svg>